# Default SFTConfig fields for recovery and elicitation training.
#
# These are passed to trl.SFTConfig. Any field that SFTConfig accepts
# can be set here. See:
#   https://huggingface.co/docs/trl/sft_trainer#trl.SFTConfig
#
# RESERVED fields (managed by the sweep scripts, do NOT set here):
#   output_dir          — set per-job to the artifact directory
#   save_strategy       — always "no" (we save manually after training)
#   report_to           — always "none" (we log to wandb separately)
#   dataset_text_field  — always "text" (matches our SFT formatting)
#
# Structure:
#   base:       shared defaults (all models, all phases)
#   recovery:   overrides for recovery training (merged on top of base)
#   elicitation: overrides for elicitation training (merged on top of base)
#   models:     per-model overrides (merged last, keyed by HF model ID)
#
# Resolution order (later wins):
#   base -> recovery/elicitation -> models.<model_id>.base -> models.<model_id>.recovery/elicitation
#
# Override any non-reserved field at runtime via --sft-overrides on the CLI:
#   --sft-overrides '{"learning_rate": 3e-5, "warmup_ratio": 0.1}'

# ---------------------------------------------------------------------------
# Shared defaults (all models, all training phases)
# ---------------------------------------------------------------------------
base:
  num_train_epochs: 1
  learning_rate: 1.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  bf16: true
  max_grad_norm: 10.0
  max_length: 1024
  logging_steps: 10

# ---------------------------------------------------------------------------
# Per-phase overrides (merged on top of base)
# ---------------------------------------------------------------------------
recovery:
  # Recovery trains on in-domain data to restore quality after pruning.
  # Typically needs fewer samples and conservative LR.
  {}

elicitation:
  # Elicitation is adversarial SFT on OOD data.
  # gradient_accumulation_steps inherited from base (32).
  warmup_ratio: 0.1

# ---------------------------------------------------------------------------
# Per-model overrides (merged last)
# ---------------------------------------------------------------------------
models:
  google/gemma-2-9b-it:
    base: {}
    recovery: {}
    elicitation: {}

  google/gemma-3-12b-it:
    # 12B may need smaller batch or more accumulation to fit in memory.
    base: {}
    recovery: {}
    elicitation: {}
