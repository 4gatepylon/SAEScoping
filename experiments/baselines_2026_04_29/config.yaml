# SweepConfig for the Wanda sparsity sweep on gemma-3-4b-it.
# See sae_scoping/utils/sweep_config.py for the full schema.
#
# Common invocations:
#   # Use this YAML as-is (sweep over the listed sparsities, no LLM judge, no W&B):
#   python sweep_wanda.py --config experiments/baselines_2026_04_29/config.yaml
#
#   # Override a single sparsity from CLI:
#   python sweep_wanda.py --config experiments/baselines_2026_04_29/config.yaml -s 0.5
#
#   # Turn on LLM judge + W&B + PGD recovery:
#   WANDB_PROJECT=deleteme python sweep_wanda.py \
#     --config experiments/baselines_2026_04_29/config.yaml \
#     --enable-llm-judge --enable-wandb --enable-pgd
#
#   # Parallel sweep across multiple GPUs (one sparsity per worker, round-robin):
#   python sweep_wanda.py --config experiments/baselines_2026_04_29/config.yaml \
#     --devices cuda:0,cuda:3,cuda:6,cuda:7
#
# Where artifacts and PGD checkpoints land:
#   $SAESCOPING_ARTIFACTS_LOCATION/outputs/{run_id}/
#     metadata.json
#     baseline.json
#     step_NNN/sweep/{step_metadata.json, judgements.jsonl, inference.jsonl, scores.json}
#     step_NNN/recovery/{step_metadata.jsonl, judgements.jsonl, inference.jsonl, scores.json}
#     step_NNN/recovery/checkpoints/checkpoint-<save_steps>/   <-- HF-format model checkpoints
# (See ./NAMING.md for the full layout + namespace spec.)

model_id: google/gemma-3-4b-it
dataset_name: 4gate/StemQAMixture
dataset_subset: biology

calibration:
  n_calibration: 1024
  max_seq_len: 2048
  batch_size: 2

sweep:
  nn_linear_sparsities: [0.2, 0.4, 0.6]
  n_eval: 1024

operational:
  device: cuda:0
  cache_dir: ./cache
  artifacts_dir: null   # null -> $SAESCOPING_ARTIFACTS_LOCATION (or '.')
  no_cache: false
  low_memory: false

  wandb:
    enabled: false
    # project / entity / mode / name / tags resolve via arg > env > default at runtime.

  llm_judge:
    enabled: false
    domains: null        # null -> use [dataset_subset]
    n_samples: 50
    # TODO(adriano) Aruna's branch also sues this but is likely pretty bad. We should A/B with other models
    # if aruna hasn't already
    judge_model: gpt-4.1-nano
    split: validation

# PGD recovery training. Effective batch = train_batch_size * grad_accum = 16.
# At max_steps=2500 that's 2500 * 16 = 40K examples seen during training.
# Logs (eval_every_steps) and saves (save_steps) every 1000 optimizer steps —
# i.e. ~3 checkpoints per sparsity (1000, 2000, 2500-final).
pgd:
  enabled: false                       # turn on with --enable-pgd or set true here
  n_train: 4000                        # unique training examples drawn from the dataset
  num_train_epochs: 1                  # ignored when max_steps > 0
  max_steps: 2500                      # 40K / (8 * 2)
  train_batch_size: 8
  gradient_accumulation_steps: 2
  warmup_ratio: 0.05
  learning_rate: 2.0e-5
  logging_steps: 100
  eval_every_steps: 1000               # RecoveryEvalCallback fires every 1K steps
  save_steps: 1000                     # checkpoint every 1K steps (set 0 to disable)
  validate_sparsity: true              # assert zeroed weights stay zero each step
  report_to: none                      # leave at "none"; our callback handles W&B
