# Wanda pruning sparsity sweep config for gemma-3-4b-it
#
# Usage (auto-detects this config.yaml):
#   python sweep_wanda.py
#
# Single nn.Linear sparsity:
#   python sweep_wanda.py -s 0.5
#
# Multiple nn.Linear sparsities (comma-separated):
#   python sweep_wanda.py -s 0.1,0.3,0.5,0.7,0.9
#
# Override model or device:
#   python sweep_wanda.py --model-id google/gemma-3-12b-it --device cuda:1
#
# Save memory by skipping mask monotonicity validation:
#   python sweep_wanda.py --low-memory

model_id: google/gemma-3-4b-it
dataset_name: 4gate/StemQAMixture
dataset_subset: biology
n_calibration: 1024
n_eval: 1024
max_seq_len: 2048
batch_size: 2
nn_linear_sparsity:
  - 0.2
  - 0.4
  - 0.6
cache_dir: ./cache
device: cuda:0
