# Wanda pruning baseline config for gemma-3-4b-it
#
# Usage:
#   python test_wanda.py --config config.yaml
#
# Override any value with CLI flags:
#   python test_wanda.py --config config.yaml --sparsity 0.6
#   python test_wanda.py --config config.yaml --model-id google/gemma-3-12b-it --device cuda:1
#   python test_wanda.py --config config.yaml --no-cache --batch-size 4
#
# Skip the config file entirely:
#   python test_wanda.py --model-id google/gemma-2-2b-it --sparsity 0.5 --n-calibration 64

model_id: google/gemma-3-4b-it
dataset_name: 4gate/StemQAMixture
dataset_subset: biology
n_calibration: 1024
n_eval: 1024
max_seq_len: 2048
batch_size: 2
sparsity: 0.4
cache_dir: ./cache
device: cuda:0
