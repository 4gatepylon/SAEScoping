# gemma-3-12b-it (mini). Effective batch = train_batch_size * gradient_accumulation_steps = 16.
# Per-script overrides via CLI: --dataset-subset (each domain has its own .sh wrapper).
# At commit 2faefb9 the runner hardcodes save_strategy="no" — no checkpoints are
# written. Merge sae_scoping/utils/sweep_config.py from adriano/baselines if you
# want the save_steps field + checkpointing under recovery/checkpoints/.

model_id: google/gemma-3-12b-it
dataset_name: 4gate/StemQAMixture

calibration:
  n_calibration: 8
  max_seq_len: 256
  batch_size: 1

sweep:
  nn_linear_sparsities: [0.4, 0.5, 0.6, 0.7]
  n_eval: 8

operational:
  device: cuda:0   # logical; physical GPU pinned by CUDA_VISIBLE_DEVICES in each .sh
  cache_dir: ./cache_mini
  artifacts_dir: null
  no_cache: true
  low_memory: false
  wandb:
    enabled: false
  llm_judge:
    enabled: false
    domains: null
    n_samples: 3
    judge_model: gpt-4.1-nano
    split: validation

pgd:
  enabled: false
  n_train: 64
  num_train_epochs: 1
  max_steps: 16
  train_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.05
  learning_rate: 2.0e-5
  logging_steps: 4
  eval_every_steps: 8
  output_dir: ./outputs_pgd_unused
  validate_sparsity: true
  report_to: none
  optim: adamw_bnb_8bit
  gradient_checkpointing: true
