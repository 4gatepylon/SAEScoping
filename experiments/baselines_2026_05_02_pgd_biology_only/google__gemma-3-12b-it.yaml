# gemma-3-12b-it — train only layers > 31. Effective batch = 4 × 4 = 16.
# Memory: 12b @ bs=4 × seq=1024 → 71.5 GiB on 79.25 GiB H100 (verified);
# seq=800 is safe. Used by full_real.yaml.

model_id: google/gemma-3-12b-it

calibration_batch_size: 1
calibration_max_seq_len: 1024

sft:
  learning_rate: 1.0e-5
  num_train_epochs: 1
  max_steps: 2005
  train_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.05
  logging_steps: 100
  save_strategy: steps
  save_steps: 1000
  optim: adamw_bnb_8bit
  gradient_checkpointing: true
  report_to: wandb

wrapper:
  eval_every_steps: 1000
  pgd_min_relevance_frac: 1.00
  pgd_min_fluency_frac: 1.00
  elicit_min_score_frac: 0.90
  min_layer_idx: 31
  max_seq_len: 1024
  eval_batch_size: 1
