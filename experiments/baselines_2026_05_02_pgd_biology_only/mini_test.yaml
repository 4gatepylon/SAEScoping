# mini_test: smallest end-to-end pipeline run, mostly for plumbing checks.
# README mapping: 200 PGD steps, 200 elicitation steps, 100 calibration
# samples, gpt-4.1-nano judge, [biology, math] only, full-parameter
# finetuning (the 2b/4b model configs already null out min_layer_idx).
# WANDB project = deleteme__baselines_2026_05_02_pgd_biology_only__full
# (per README; the "full" suffix is the test-bench's name, not a real run).

name: mini_test

model_configs:
  - google__gemma-2-2b-it.yaml
  - google__gemma-3-4b-it.yaml
scope_domains: [biology, math]
elicitation_domains: null  # auto = (scope_domains \ {scope})
sparsities: [0.65, 0.75]
calibration_sweep_sparsities: [0.0, 0.65, 0.75, 1.0]
dataset_name: 4gate/StemQAMixture
n_calibration: 20
n_train: 1000
n_eval: 32

operational:
  artifacts_subdir: baselines_2026_05_02_pgd_biology_only
  devices: [cuda:0]
  no_cache: false
  wandb:
    enabled: true
    project: deleteme__baselines_2026_05_02_pgd_biology_only__mini_test
  llm_judge:
    enabled: true
    judge_model: gpt-4.1-nano
    n_samples: 4
    split: validation

# Per README "Testing and Running" → option 2: mini_test caps PGD/elicit
# at 200 steps. Model YAMLs default to 2000; clamp via sft_overrides.
sft_overrides:
  logging_steps: 1
  max_steps: 20
  save_steps: 16
